			runOnlyForDeploymentPostprocessing = 1;
			shellPath = /bin/sh;
			shellScript = "# dSYM Generation Script - Handles permissions and generates dSYMs\n# This script runs during archive to ensure all framework dSYMs are included\n\nset +e  # Don't fail on errors (permission issues)\n\necho \"🔍 [dSYM] Starting dSYM generation...\"\n\n# Determine archive paths\nARCHIVE_FRAMEWORKS_PATH=\"\"\nARCHIVE_DSYMS_PATH=\"${DWARF_DSYM_FOLDER_PATH}\"\n\n# Primary: Use ARCHIVE_PRODUCTS_PATH (available during archive)\nif [ -n \"${ARCHIVE_PRODUCTS_PATH}\" ]; then\n    ARCHIVE_FRAMEWORKS_PATH=\"${ARCHIVE_PRODUCTS_PATH}/Applications/${PRODUCT_NAME}.app/Frameworks\"\n    ARCHIVE_DSYMS_PATH=\"${ARCHIVE_PRODUCTS_PATH}/dSYMs\"\n    mkdir -p \"$ARCHIVE_DSYMS_PATH\" 2>/dev/null || true\nfi\n\n# Fallback: Use standard build paths\nif [ -z \"$ARCHIVE_FRAMEWORKS_PATH\" ] || [ ! -d \"$ARCHIVE_FRAMEWORKS_PATH\" ]; then\n    ARCHIVE_FRAMEWORKS_PATH=\"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}\"\n    if [ -z \"$ARCHIVE_DSYMS_PATH\" ]; then\n        ARCHIVE_DSYMS_PATH=\"${DWARF_DSYM_FOLDER_PATH}\"\n    fi\nfi\n\n# Ensure dSYMs path exists\nif [ -n \"$ARCHIVE_DSYMS_PATH\" ]; then\n    mkdir -p \"$ARCHIVE_DSYMS_PATH\" 2>/dev/null || true\nfi\n\nif [ ! -d \"$ARCHIVE_DSYMS_PATH\" ]; then\n    echo \"⚠️ [dSYM] Could not create archive dSYMs path, skipping\"\n    exit 0\nfi\n\necho \"📦 [dSYM] Archive frameworks: $ARCHIVE_FRAMEWORKS_PATH\"\necho \"📦 [dSYM] Archive dSYMs: $ARCHIVE_DSYMS_PATH\"\n\n# Required frameworks\nREQUIRED_FRAMEWORKS=(\n    \"FirebaseFirestoreInternal\"\n    \"absl\"\n    \"aosl\"\n    \"grpc\"\n    \"grpcpp\"\n    \"openssl_grpc\"\n)\n\n# Function to copy framework to temp location (avoids permission issues)\ncopy_framework_to_temp() {\n    local framework_path=$1\n    local temp_dir=$2\n    \n    if [ ! -d \"$framework_path\" ]; then\n        return 1\n    fi\n    \n    local framework_name=$(basename \"$framework_path\" .framework)\n    local temp_framework=\"$temp_dir/${framework_name}.framework\"\n    \n    # Copy framework to temp locati